name: Generate signing key

# Run this ONCE (Actions tab -> "Generate signing key" -> Run workflow).
# It mints a stable keystore and writes the values you must paste into
# repository secrets. The keystore + secrets are uploaded as a private
# build artifact (NOT printed to the public log).

on:
  workflow_dispatch:
    inputs:
      alias:
        description: Key alias
        default: shatkey
        required: true
      validity_years:
        description: Validity (years)
        default: '30'
        required: true

permissions: {}

jobs:
  keygen:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        env:
          ALIAS: ${{ inputs.alias }}
          VALIDITY_YEARS: ${{ inputs.validity_years }}
        run: |
          STORE_PW="$(openssl rand -hex 24)"
          keytool -genkeypair -v \
            -keystore signingkey.jks \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 4096 \
            -validity "$(( VALIDITY_YEARS * 365 ))" \
            -storepass "$STORE_PW" -keypass "$STORE_PW" \
            -dname "CN=Shat Extensions, OU=Personal, O=Personal, L=NA, ST=NA, C=US"

          # SHA-256 of the signing certificate (optional, only needed if you later
          # want Mihon to auto-trust instead of prompting once).
          SHA="$(keytool -list -v -keystore signingkey.jks -storepass "$STORE_PW" \
                  | grep -i 'SHA256:' | head -1 | sed 's/.*SHA256: //; s/://g' | tr 'A-Z' 'a-z')"

          {
            echo "Paste each of these into: Settings -> Secrets and variables -> Actions -> New repository secret"
            echo
            echo "Name:  ALIAS"
            echo "Value: $ALIAS"
            echo
            echo "Name:  KEY_STORE_PASSWORD"
            echo "Value: $STORE_PW"
            echo
            echo "Name:  KEY_PASSWORD"
            echo "Value: $STORE_PW"
            echo
            echo "Name:  SIGNING_KEY"
            echo "Value (base64, single line):"
            base64 -w0 signingkey.jks
            echo
            echo
            echo "Certificate SHA-256 (optional, for auto-trust): $SHA"
          } > secrets.txt

      - name: Upload keystore + secrets (download, copy into secrets, then delete this run)
        uses: actions/upload-artifact@v4
        with:
          name: keystore-and-secrets
          path: |
            signingkey.jks
            secrets.txt
          retention-days: 1
